<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ══════════════════════════════════════════
//  WORD EXPORT
// ══════════════════════════════════════════

// Toggle export dropdown
function toggleExportMenu(){
  const m=document.getElementById('export-menu');
  m.style.display=m.style.display==='none'?'block':'none';
}
document.addEventListener('click',e=>{
  if(!document.getElementById('export-word-wrap')?.contains(e.target))
    document.getElementById('export-menu').style.display='none';
});

// Period metadata (id → label + time string)
const PINFO={
  1:{t:'08:10-09:00'},2:{t:'09:10-10:00'},3:{t:'10:10-11:00'},4:{t:'11:10-12:00'},
  5:{t:'13:30-14:20'},6:{t:'14:30-15:20'},7:{t:'15:30-16:20'},8:{t:'16:30-17:20'},
  9:{t:'17:30-18:20'},A:{t:'18:30-19:20'},B:{t:'19:25-20:15'},C:{t:'20:20-21:10'},D:{t:'21:15-22:05'}
};
const ALL_PIDS=[1,2,3,4,5,6,7,8,9,'A','B','C','D'];
const DAYS5=[1,2,3,4,5];
const DAYS6=[1,2,3,4,5,6];
const DLABELS={1:'週一',2:'週二',3:'週三',4:'週四',5:'週五',6:'週六'};

function xe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Build a timetable cell XML
function wCell(text, {w=1500,bold=false,bg='',fs=18,valign='center'}={}){
  const bdr='<w:top w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:left w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:bottom w:val="single" w:sz="4" w:space="0" w:color="auto"/><w:right w:val="single" w:sz="4" w:space="0" w:color="auto"/>';
  const shd=bg?`<w:shd w:val="clear" w:color="auto" w:fill="${bg}"/>`:'';
  const b=bold?'<w:b/>':'';
  // Support newlines → multiple paragraphs
  const lines=String(text||'').split('\n');
  const paras=lines.map((ln,i)=>{
    const sp=i===0?'':`<w:spacing w:before="0" w:after="0"/>`;
    return `<w:p><w:pPr><w:jc w:val="center"/><w:rPr>${b}<w:sz w:val="${fs}"/><w:szCs w:val="${fs}"/></w:rPr></w:pPr><w:r><w:rPr>${b}<w:sz w:val="${fs}"/><w:szCs w:val="${fs}"/></w:rPr><w:t xml:space="preserve">${xe(ln)}</w:t></w:r></w:p>`;
  }).join('');
  return `<w:tc><w:tcPr><w:tcW w:w="${w}" w:type="dxa"/><w:tcBorders>${bdr}</w:tcBorders>${shd}<w:vAlign w:val="${valign}"/></w:tcPr>${paras}</w:tc>`;
}

function wRow(cells, height=480){
  return `<w:tr><w:trPr><w:trHeight w:val="${height}"/><w:cantSplit/></w:trPr>${cells}</w:tr>`;
}

// Build slot lookup: day → periodId → display info
function makeSlotLookup(filterFn){
  const cm={};
  COURSES.forEach(c=>{ cm[c.id]=c; });
  const lookup={};
  for(const cls of CLASSES){
    for(const entry of (schedule[cls.id]||[])){
      if(!filterFn(entry,cls)) continue;
      const co=cm[entry.courseId]; if(!co) continue;
      const rm=entry.roomId?ROOMS.find(r=>r.id===entry.roomId):null;
      entry.slots.forEach((pid,i)=>{
        if(!lookup[entry.day]) lookup[entry.day]={};
        lookup[entry.day][pid]=i===0
          ? {name:co.name,teachers:co.teachers.map(tid=>tmap[tid]?.name||tid).join('、'),
             className:cls.name,roomName:rm?.name||'',span:entry.slots.length,first:true}
          : {cont:true};
      });
    }
  }
  return lookup;
}

// Build all table rows XML for one timetable
function buildRows(days, lookup, colW, labelW, timeW, numW){
  const rows=[];
  // Header
  const hdrCells=wCell('',{w:labelW,bold:true,bg:'D9D9D9'})
    +wCell('時間',{w:timeW,bold:true,bg:'D9D9D9'})
    +wCell('節',{w:numW,bold:true,bg:'D9D9D9'})
    +days.map(d=>wCell(DLABELS[d]||`週${d}`,{w:colW,bold:true,bg:'D9D9D9'})).join('');
  rows.push(wRow(hdrCells,440));

  for(const pid of ALL_PIDS){
    // Noon divider before period 5
    if(pid===5){
      const nCells=wCell('午休',{w:labelW,bold:true,bg:'F0F0F0',fs:16})
        +wCell('12:00-13:30',{w:timeW,bg:'F0F0F0',fs:14})
        +wCell('',{w:numW,bg:'F0F0F0'})
        +days.map(()=>wCell('',{w:colW,bg:'F0F0F0'})).join('');
      rows.push(wRow(nCells,300));
    }
    const pinfo=PINFO[pid];
    const labelCells=wCell('',{w:labelW,bg:'FAFAFA'})
      +wCell(pinfo.t,{w:timeW,bg:'FAFAFA',fs:14})
      +wCell(String(pid),{w:numW,bold:true,bg:'F0F0F0',fs:16});

    const dayCells=days.map(day=>{
      const slot=lookup[day]?.[pid];
      if(!slot) return wCell('',{w:colW});
      if(slot.cont) return wCell('',{w:colW,bg:'EBF3FB'}); // continuation
      // Build cell lines based on what view this is
      const lines=[slot.name];
      if(slot.teachers) lines.push(slot.teachers);
      if(slot.roomName) lines.push('📍'+slot.roomName);
      if(slot.className) lines.push('['+slot.className+']');
      return wCell(lines.join('\n'),{w:colW,bg:'EBF3FB',fs:16});
    }).join('');

    rows.push(wRow(labelCells+dayCells,480));
  }
  return rows.join('');
}

// Generate one .docx blob from multiple sections (one per page)
async function makeDocx(sections){
  if(typeof JSZip==='undefined') throw new Error('JSZip 尚未載入，請稍後再試或檢查網路連線');

  const PAGE_W=16838, PAGE_H=11906, MARGIN=500; // landscape A4, tight margins

  let body='';
  sections.forEach((sec,i)=>{
    if(i>0) body+=`<w:p><w:r><w:br w:type="page"/></w:r></w:p>`;
    body+=`<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:after="60"/></w:pPr>
      <w:r><w:rPr><w:b/><w:sz w:val="26"/><w:szCs w:val="26"/></w:rPr>
      <w:t>國立高雄科技大學-供應鏈管理系　115學年度第1學期　${xe(sec.title)}　課程表</w:t></w:r></w:p>`;
    body+=`<w:tbl>
      <w:tblPr>
        <w:tblW w:w="0" w:type="auto"/>
        <w:tblBorders>
          <w:insideH w:val="single" w:sz="4" w:space="0" w:color="AAAAAA"/>
          <w:insideV w:val="single" w:sz="4" w:space="0" w:color="AAAAAA"/>
        </w:tblBorders>
        <w:tblLayout w:type="fixed"/>
        <w:tblCellMar><w:top w:w="40" w:type="dxa"/><w:left w:w="60" w:type="dxa"/><w:bottom w:w="40" w:type="dxa"/><w:right w:w="60" w:type="dxa"/></w:tblCellMar>
      </w:tblPr>
      ${sec.tableRows}
    </w:tbl>`;
  });

  const docXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
            xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<w:body>
${body}
<w:sectPr>
  <w:pgSz w:w="${PAGE_H}" w:h="${PAGE_W}" w:orient="landscape"/>
  <w:pgMar w:top="${MARGIN}" w:right="${MARGIN}" w:bottom="${MARGIN}" w:left="${MARGIN}"/>
</w:sectPr>
</w:body>
</w:document>`;

  const contentTypes=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

  const rels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const zip=new JSZip();
  zip.file('[Content_Types].xml', contentTypes);
  zip.file('_rels/.rels', rels);
  zip.file('word/document.xml', docXml);
  zip.file('word/_rels/document.xml.rels',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>');

  return zip.generateAsync({
    type:'blob',
    mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
}

async function exportWord(type){
  document.getElementById('export-menu').style.display='none';
  showToast('正在產生 Word 檔案…');

  try{
    const sections=[];

    if(type==='class'){
      for(const cls of CLASSES){
        const days=(cls.type==='day'||cls.type==='grad')?DAYS5:DAYS6;
        const nDays=days.length;
        // landscape A4 usable width (DXA): 11906 - 2*500 = 10906
        const usable=10906;
        const labelW=360, timeW=1000, numW=320;
        const colW=Math.floor((usable-labelW-timeW-numW)/nDays);
        const lookup=makeSlotLookup((entry,c)=>c.id===cls.id);
        sections.push({title:cls.name, tableRows:buildRows(days,lookup,colW,labelW,timeW,numW)});
      }
      const blob=await makeDocx(sections);
      dlBlob(blob,`SCM班級課表_${yyyymmdd()}.docx`);

    } else if(type==='teacher'){
      for(const t of TEACHERS){
        const lookup=makeSlotLookup((entry)=>{
          const co=COURSES.find(c=>c.id===entry.courseId);
          return co?.teachers.includes(t.id);
        });
        if(!Object.keys(lookup).length) continue;
        const usable=10906;
        const labelW=360, timeW=1000, numW=320;
        const colW=Math.floor((usable-labelW-timeW-numW)/6);
        sections.push({title:`${t.name}（${t.type}）`, tableRows:buildRows(DAYS6,lookup,colW,labelW,timeW,numW)});
      }
      if(!sections.length){ showToast('⚠ 尚無教師已排課'); return; }
      const blob=await makeDocx(sections);
      dlBlob(blob,`SCM教師課表_${yyyymmdd()}.docx`);

    } else if(type==='room'){
      for(const room of ROOMS){
        const lookup=makeSlotLookup(entry=>entry.roomId===room.id);
        if(!Object.keys(lookup).length) continue;
        const usable=10906;
        const labelW=360, timeW=1000, numW=320;
        const colW=Math.floor((usable-labelW-timeW-numW)/6);
        sections.push({title:`教室 ${room.name}`, tableRows:buildRows(DAYS6,lookup,colW,labelW,timeW,numW)});
      }
      if(!sections.length){ showToast('⚠ 尚無教室已排課'); return; }
      const blob=await makeDocx(sections);
      dlBlob(blob,`SCM教室課表_${yyyymmdd()}.docx`);
    }

    showToast('✓ Word 檔案已下載');
  } catch(err){
    console.error('匯出失敗:', err);
    showToast('⚠ 匯出失敗：'+err.message);
  }
}

function dlBlob(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}

function yyyymmdd(){ return new Date().toISOString().slice(0,10); }
</script>
